services:
  - type: web
    name: devspire-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ALLOWED_ORIGINS
        value: https://devspire.ie,https://www.devspire.ie,https://devspire.vercel.app
      - key: RATE_LIMIT_MAX
        value: "5"
      - key: RATE_WINDOW_SECS
        value: "3600"
    plan: free
    region: oregon
    rootDir: api
